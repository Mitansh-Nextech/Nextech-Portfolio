<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="navbar">
        <div class=navHome>
            <div class="navHomeIcon">
                <img class="navIconHomeLight" src="navIcons/home-icon-light.png" alt="home icon" id="iconLight">
                <img class="navIconHomeDark" src="navIcons/home-icon-dark.png" alt="home icon" id="iconDark">
            </div>
            <h2 class="navHomeH2">
                Home
            </h2>
        </div>
        <div class="navAbout">
            <div class="navAboutIcon">
                <img src="navIcons/about-icon-light.png" alt="about icon" class="navIconAboutLight" id="iconLight">
                <img src="navIcons/about-icon-dark.png" alt="about icon" class="navIconAboutDark" id="iconDark">
            </div>
            <h2 class="navAboutH2">
                About
            </h2>
        </div>
        <div class="navProjects">
            <div class="navProjectsIcon">
                <img src="navIcons/projects-icon-light.png" alt="file icons" class="navIconProjectsLight"
                    id="iconLight">
                <img src="navIcons/projects-icon-dark.png" alt="file icons" class="navIconProjectsDark" id="iconDark">
            </div>
            <h2 class="navProjectsH2">
                Projects
            </h2>
        </div>
        <div class="navContact">
            <div class="navContactIcon">
                <img src="navIcons/connect-icon-light.png" alt="phone icon" class="navIconConnectLight" id="iconLight">
                <img src="navIcons/connect-icon-dark.png" alt="phone icon" class="navIconConnetDark" id="iconDark">
            </div>
            <h2 class="navContactH2">
                Connect
            </h2>
        </div>
    </div>
</body>

</html>
